schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
context: |
  ShopNest is a multi-tenant e-commerce SaaS platform for Bangladeshi small and medium retail businesses and merchants of any category (bKash/Nagad manual payment verification, storefront subdomains, order status tracking, guest OTP checkout, discount codes, storefront customization, trial & subscription tiers).

  Tech Stack:
    - Framework: Next.js 16.2.9 (App Router, cacheComponents: true), React 19, TypeScript 5.x.
    - Database/Auth: Supabase (Postgres, Storage, Realtime), Better Auth, Drizzle ORM.
    - Notifications: Resend (Email), Telegram bot API (Async queue via Supabase Edge Function + pg_cron).
    - Client State: Zustand.
    - Build/Dev: Turbopack (`next dev --turbo`).

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
rules:
  proposal:
    - Ensure proposals define clear boundary contracts for any new libraries.
    - Use grill-me skill
  design:
    - Must specify how the Next.js 16.2.9 caching strategy ("use cache", connection(), `<Suspense>`) is handled.
    - Must document the DB schema modifications and the multi-tenant query filter implementation.
    - Must specify the test strategy (unit, library contract, or integration).
    - Must check UI designs against `DESIGN.md` rules (colors, pill-only buttons, no shadows, typography).
  tasks:
    - Require writing the failing tests (TDD) before implementation code.
    - Break tasks down into granular, components-level steps with clear verification criteria.
